<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presence OAuth Callback</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #121923;
      --text: #f4f7fb;
      --muted: #9aa7b5;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #7dd3fc;
      --danger: #fb7185;
      --success: #86efac;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #080c11;
      color: var(--text);
      font: inherit;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button,
    a.button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: #172232;
      color: var(--text);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary,
    a.primary {
      border-color: rgba(125, 211, 252, 0.45);
      background: rgba(125, 211, 252, 0.14);
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }

    .success {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main>
    <h1>Presence OAuth Callback</h1>
    <p id="message">Copy the authorization code back into Presence.</p>

    <label for="provider">Provider</label>
    <input id="provider" readonly />

    <label for="code">Authorization Code</label>
    <textarea id="code" readonly></textarea>

    <label for="state">State</label>
    <input id="state" readonly />

    <div class="row">
      <button class="primary" id="copyCode">Copy Code</button>
      <button id="openApp">Open Presence</button>
    </div>

    <div id="status" class="status"></div>
  </main>

  <script>
    const APP_CALLBACK_SCHEME = "presence://oauth-callback";

    const query = new URLSearchParams(window.location.search);
    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));

    const getParam = (name) => query.get(name) || hash.get(name) || "";

    const code = getParam("code");
    const state = getParam("state");
    const error = getParam("error");
    const errorDescription = getParam("error_description");

    const providerFromState = state.toLowerCase().includes("tesla")
      ? "tesla"
      : state.toLowerCase().includes("spotify")
        ? "spotify"
        : "";

    const provider =
      getParam("provider") ||
      providerFromState ||
      new URLSearchParams(window.location.search).get("provider") ||
      "unknown";

    const providerInput = document.getElementById("provider");
    const codeInput = document.getElementById("code");
    const stateInput = document.getElementById("state");
    const message = document.getElementById("message");
    const status = document.getElementById("status");
    const copyCode = document.getElementById("copyCode");
    const openApp = document.getElementById("openApp");

    providerInput.value = provider;
    codeInput.value = code;
    stateInput.value = state;

    if (error) {
      message.textContent = "Authorization failed.";
      status.className = "status error";
      status.textContent = errorDescription || error;
    } else if (code) {
      message.textContent = "Authorization succeeded. Copy this code back into Presence.";
      status.className = "status success";
      status.textContent = "Code received.";
    } else {
      message.textContent = "No authorization code was found in the callback URL.";
      status.className = "status error";
      status.textContent = "Check that the redirect URI exactly matches the one registered with the provider.";
    }

    copyCode.addEventListener("click", async () => {
      if (!code) return;

      try {
        await navigator.clipboard.writeText(code);
        status.className = "status success";
        status.textContent = "Authorization code copied.";
      } catch {
        codeInput.select();
        document.execCommand("copy");
        status.className = "status success";
        status.textContent = "Authorization code copied.";
      }
    });

    openApp.addEventListener("click", () => {
      const appUrl = new URL(APP_CALLBACK_SCHEME);
      if (provider) appUrl.searchParams.set("provider", provider);
      if (code) appUrl.searchParams.set("code", code);
      if (state) appUrl.searchParams.set("state", state);
      if (error) appUrl.searchParams.set("error", error);
      if (errorDescription) appUrl.searchParams.set("error_description", errorDescription);

      window.location.href = appUrl.toString();
    });
  </script>
</body>
</html>
